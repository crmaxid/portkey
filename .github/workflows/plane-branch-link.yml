name: Plane — Attach Branch Link & Set In Progress

on:
  create:
  push:
    branches:
      - '**'

jobs:
  attach-link:
    if: contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - name: Extract work item identifier
        id: check
        run: |
          identifier=$(echo "${{ github.ref_name }}" | grep -oE '[A-Za-z][A-Za-z0-9]*-[0-9]+' | head -1)
          if [[ -n "$identifier" ]]; then
            echo "is_work_item=true" >> $GITHUB_OUTPUT
            echo "identifier=$identifier" >> $GITHUB_OUTPUT
          else
            echo "is_work_item=false" >> $GITHUB_OUTPUT
          fi

      - name: Attach branch link to work item
        if: steps.check.outputs.is_work_item == 'true' && github.event_name == 'create'
        run: |
          curl -sf -X POST "${{ secrets.PORTKEY_URL }}/plane/crmax-performance/branch/link" \
            -H "Content-Type: application/json" \
            -d "{
              \"branch\": \"${{ steps.check.outputs.identifier }}\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}\"
            }"

      - name: Set work item state to In Progress
        if: steps.check.outputs.is_work_item == 'true'
        run: |
          curl -s --fail-with-body -X PATCH "${{ secrets.PORTKEY_URL }}/plane/crmax-performance/branch/state" \
            -H "Content-Type: application/json" \
            -d "{
              \"branch\": \"${{ steps.check.outputs.identifier }}\",
              \"state\": \"In Progress\"
            }"
