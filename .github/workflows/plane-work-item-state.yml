name: Plane — Update Work Item State

on:
  pull_request:
    types:
      - opened
      - review_requested
      - closed

jobs:
  update-state:
    if: contains(github.head_ref, '-')
    runs-on: ubuntu-latest
    steps:
      - name: Check if work item branch
        id: check
        run: |
          if [[ "${{ github.head_ref }}" =~ ^[A-Za-z][A-Za-z0-9]*-[0-9]+$ ]]; then
            echo "is_work_item=true" >> $GITHUB_OUTPUT
          else
            echo "is_work_item=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve target state
        if: steps.check.outputs.is_work_item == 'true'
        id: resolve
        run: |
          if [[ "${{ github.event.action }}" == "opened" ]]; then
            echo "state=In Progress" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.action }}" == "review_requested" ]]; then
            echo "state=PR Review" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "state=Ready For QA" >> $GITHUB_OUTPUT
          else
            echo "state=Cancelled" >> $GITHUB_OUTPUT
          fi

      - name: Update work item state
        if: steps.check.outputs.is_work_item == 'true'
        run: |
          curl -sf -X PATCH "${{ secrets.PORTKEY_URL }}/plane/crmax-performance/branch/state" \
            -H "Content-Type: application/json" \
            -d "{
              \"branch\": \"${{ github.head_ref }}\",
              \"state\": \"${{ steps.resolve.outputs.state }}\"
            }"
