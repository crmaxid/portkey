name: Build and Push Docker Image

on:
  push:
    branches:
      - staging
      - main
    paths:
      - "**/*.ts"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: DEPLOYMENT

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and push for staging
        if: github.ref == 'refs/heads/staging'
        run: |
          docker build -t $DOCKER_USERNAME/crmax-hub:portkey-staging .
          docker push $DOCKER_USERNAME/crmax-hub:portkey-staging

      - name: Build and push for production
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t $DOCKER_USERNAME/crmax-hub:portkey-production .
          docker push $DOCKER_USERNAME/crmax-hub:portkey-production

  release:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: DEPLOYMENT

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$LATEST" ]; then
            echo "tag=v1.0.0" >> $GITHUB_OUTPUT
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            echo "tag=v$MAJOR.$MINOR.$((PATCH + 1))" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
