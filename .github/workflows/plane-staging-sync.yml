name: Plane — Mark Ready for QA on Staging Deploy

on:
  pull_request:
    types:
      - closed
    branches:
      - staging

jobs:
  mark-ready-for-qa:
    if: github.event.pull_request.merged == true && github.head_ref == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract work items from commits and mark Ready for QA
        run: |
          git log ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --format="%s %b" \
            | grep -oE '[A-Za-z][A-Za-z0-9]*-[0-9]+' \
            | sort -u \
            | while read identifier; do
                echo "Marking $identifier as Ready For QA..."
                curl --fail-with-body -s -X PATCH "${{ secrets.PORTKEY_URL }}/plane/crmax-performance/branch/state" \
                  -H "Content-Type: application/json" \
                  -d "{\"branch\": \"$identifier\", \"state\": \"Ready For QA\"}" || \
                echo "Warning: failed to update $identifier, skipping"
              done
